<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEXUS-9 机器人行为中枢</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#050812; --panel:#0b1222cc; --line:#3ef3ff44; --cyan:#3ef3ff;
      --ok:#74ff9f; --warn:#ffcc7a; --txt:#ebf9ff; --muted:#9bc0d0; --vio:#8e78ff;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;color:var(--txt);font-family:'Rajdhani',sans-serif;
      background:
        radial-gradient(900px 380px at 80% -20%, #8e78ff30, transparent),
        radial-gradient(900px 420px at -10% 120%, #3ef3ff30, transparent),
        linear-gradient(140deg,#02040a,#050a16 50%,#081023);
      overflow:hidden;
    }
    body::before{
      content:"";position:fixed;inset:0;pointer-events:none;
      background-image:linear-gradient(#3ef3ff20 1px,transparent 1px),linear-gradient(90deg,#3ef3ff20 1px,transparent 1px);
      background-size:36px 36px;mask-image:radial-gradient(circle at center,black 45%,transparent 95%);
      animation:grid 18s linear infinite;
    }
    @keyframes grid{to{transform:translateY(36px)}}

    .shell{
      width:min(980px,94vw);margin:3vh auto;display:grid;grid-template-columns:1fr 1.2fr;
      border:1px solid var(--line);border-radius:18px;overflow:hidden;
      box-shadow:0 0 30px #3ef3ff30,inset 0 0 20px #3ef3ff1a;background:#060d1acc;
      backdrop-filter:blur(8px);
    }
    .left{padding:24px;border-right:1px solid var(--line);display:flex;flex-direction:column;gap:20px}
    .brand{font-family:'Orbitron',sans-serif;letter-spacing:.12em;font-size:12px;color:#b9fcff}
    .core{padding:16px;border:1px solid var(--line);border-radius:14px;background:#091428aa}
    .eye{width:170px;height:170px;border-radius:50%;margin:0 auto;display:grid;place-items:center;position:relative;
      border:2px solid #3ef3ff66;background:radial-gradient(circle,#3ef3ff36 0%,#3ef3ff12 45%,#060f1f 80%);
      box-shadow:0 0 24px #3ef3ff55,inset 0 0 24px #3ef3ff44}
    .eye::before{content:"";position:absolute;inset:0;border-radius:50%;
      background:repeating-conic-gradient(from 0deg,#3ef3ff44 0deg 7deg,transparent 7deg 14deg);animation:spin 9s linear infinite}
    .pupil{width:72px;height:72px;border-radius:50%;z-index:1;border:2px solid #74ff9f;
      background:radial-gradient(circle,#74ff9f,#74ff9f55);box-shadow:0 0 16px #74ff9faa,inset 0 0 16px #74ff9f66;animation:pulse 2.4s ease-in-out infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(.88)}}

    .status{list-style:none;display:grid;gap:8px;color:var(--muted)}
    .status li{display:flex;justify-content:space-between;border-bottom:1px dashed #3ef3ff33;padding-bottom:6px}
    .tag{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:.08em;color:var(--ok)}

    .right{padding:22px;display:flex;flex-direction:column;gap:14px}
    .tabs{display:flex;border:1px solid var(--line);border-radius:12px;overflow:hidden}
    .tab{flex:1;border:0;cursor:pointer;padding:11px 6px;background:#12203cb0;color:var(--muted);
      font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:.06em;transition:.2s}
    .tab.active{background:linear-gradient(135deg,var(--cyan),#9fffff);color:#021019}

    .card{border:1px solid var(--line);border-radius:14px;padding:18px;background:var(--panel);min-height:390px}
    .view{display:none;animation:fade .3s ease}.view.active{display:block}
    @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    h2{font-family:'Orbitron',sans-serif;font-size:22px;margin-bottom:6px}
    .sub{color:var(--muted);margin-bottom:14px}
    .field{margin-bottom:12px}
    label{display:block;color:#c1f9ff;margin-bottom:5px}
    input{width:100%;border-radius:10px;border:1px solid #3ef3ff33;background:#070f20f2;color:var(--txt);padding:11px 12px;font-size:15px}
    input:focus{outline:0;border-color:var(--cyan);box-shadow:0 0 0 3px #3ef3ff2e}
    .btn{width:100%;border:0;border-radius:10px;padding:12px;cursor:pointer;font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:.06em;
      background:linear-gradient(135deg,var(--cyan),#96ffff);color:#051018;box-shadow:0 0 16px #3ef3ff44}
    .btn:hover{transform:translateY(-1px)}
    .links{display:flex;justify-content:space-between;margin-top:11px;font-size:14px}
    .links a{color:#b7fbff;text-decoration:none}.links a:hover{text-decoration:underline}
    .tip{margin-top:12px;border-left:3px solid var(--warn);padding:8px 10px;background:#ffcc7a1f;color:#ffe6bb;border-radius:4px;font-size:13px}
    .toast{position:fixed;right:16px;bottom:16px;opacity:0;transform:translateY(16px);transition:.25s;pointer-events:none;
      border:1px solid var(--line);background:#0a1529f0;color:var(--txt);padding:12px 14px;border-radius:10px}
    .toast.show{opacity:1;transform:translateY(0)}

    @media (max-width:900px){body{overflow:auto}.shell{grid-template-columns:1fr;margin:18px auto}.left{border-right:0;border-bottom:1px solid var(--line)}}
  </style>
</head>
<body>
  <main class="shell">
    <section class="left">
      <div class="brand">NEXUS-9 ROBOT BEHAVIOR HUB</div>
      <div class="core">
        <div class="eye"><div class="pupil"></div></div>
      </div>
      <ul class="status">
        <li><span>行为识别引擎</span><span class="tag">ONLINE</span></li>
        <li><span>语义预测模块</span><span class="tag">READY</span></li>
        <li><span>动作建模系统</span><span class="tag">ACTIVE</span></li>
        <li><span>安全等级</span><span class="tag" style="color:var(--warn)">LEVEL-2</span></li>
      </ul>
    </section>

    <section class="right">
      <div class="tabs">
        <button class="tab active" data-view="login">登录</button>
        <button class="tab" data-view="register">注册</button>
        <button class="tab" data-view="forgot">找回密码</button>
      </div>

      <div class="card">
        <form id="login" class="view active" action="/login" method="POST">
          <h2>身份接入 · 登录</h2>
          <p class="sub">连接机器人行为控制台，查看实时轨迹。</p>
          <div class="field"><label for="u">账号</label><input id="u" name="username" required placeholder="例如：admin" /></div>
          <div class="field"><label for="p">密码</label><input id="p" type="password" name="password" required placeholder="请输入密码" /></div>
          <button class="btn" type="submit">进入控制台</button>
          <div class="links"><a href="#" data-jump="register">没有账号？注册</a><a href="#" data-jump="forgot">忘记密码</a></div>
          <div class="tip">演示账号：admin / 123456</div>
        </form>

        <form id="register" class="view">
          <h2>新建身份 · 注册</h2>
          <p class="sub">创建新操作员账号，申请控制权限。</p>
          <div class="field"><label for="ru">用户名</label><input id="ru" required placeholder="4~16位用户名" /></div>
          <div class="field"><label for="re">邮箱</label><input id="re" type="email" required placeholder="name@example.com" /></div>
          <div class="field"><label for="rp">密码</label><input id="rp" type="password" required placeholder="至少6位" /></div>
          <button class="btn" type="submit">注册并申请接入</button>
        </form>

        <form id="forgot" class="view">
          <h2>权限恢复 · 找回密码</h2>
          <p class="sub">提交身份信息，系统将发送重置链路。</p>
          <div class="field"><label for="fu">账号/邮箱</label><input id="fu" required placeholder="请输入账号或邮箱" /></div>
          <div class="field"><label for="fd">设备识别码(选填)</label><input id="fd" placeholder="如 N9-TRM-2048" /></div>
          <button class="btn" type="submit">发送重置指令</button>
        </form>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script>
    const tabs = document.querySelectorAll('.tab');
    const views = document.querySelectorAll('.view');
    const toast = document.getElementById('toast');

    const switchView = (name) => {
      tabs.forEach(t => t.classList.toggle('active', t.dataset.view === name));
      views.forEach(v => v.classList.toggle('active', v.id === name));
    };

    const showToast = (msg) => {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1800);
    };

    tabs.forEach(t => t.addEventListener('click', () => switchView(t.dataset.view)));
    document.querySelectorAll('[data-jump]').forEach(a => a.addEventListener('click', (e) => {
      e.preventDefault();
      switchView(a.dataset.jump);
    }));

    document.getElementById('register').addEventListener('submit', (e) => {
      e.preventDefault();
      showToast('注册请求已提交（前端演示模式）');
      switchView('login');
    });

    document.getElementById('forgot').addEventListener('submit', (e) => {
      e.preventDefault();
      showToast('重置链路已发送，请检查邮箱');
      switchView('login');
    });
  </script>
</body>
</html>
